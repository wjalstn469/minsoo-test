<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생산 공정 실시간 모니터링 대시보드</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#3b82f6',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        background: '#f8fafc',
                        surface: '#ffffff',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; background-color: #f8fafc; color: #334155; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 z-50 flex flex-col justify-center items-center backdrop-blur-sm">
        <div class="loader mb-4"></div>
        <p class="text-primary font-semibold text-lg">데이터를 불러오고 분석하는 중입니다...</p>
    </div>

    <div class="max-w-7xl mx-auto space-y-6">
        <!-- Header -->
        <header class="bg-primary text-white rounded-2xl p-6 md:p-8 flex flex-col md:flex-row justify-between items-start md:items-center card-shadow">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold flex items-center gap-3">
                    <i data-lucide="activity"></i> 실시간 생산 공정 대시보드
                </h1>
                <p class="mt-2 text-blue-200 text-sm md:text-base">Google Sheets 데이터 기반 실시간 KPI 모니터링</p>
            </div>
            <div class="mt-4 md:mt-0 text-right bg-white/10 p-3 rounded-lg border border-white/20">
                <p class="text-xs text-blue-200 mb-1">마지막 업데이트</p>
                <p id="updateTime" class="font-mono text-lg font-medium"></p>
                <button onclick="fetchData()" class="mt-2 text-xs bg-white text-primary px-3 py-1 rounded-full hover:bg-blue-50 transition-colors font-bold flex items-center gap-1 justify-center w-full">
                    <i data-lucide="refresh-cw" class="w-3 h-3"></i> 새로고침
                </button>
            </div>
        </header>

        <!-- KPI Cards -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
            <div class="bg-surface rounded-xl p-5 border-t-4 border-secondary card-shadow">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm text-slate-500 font-medium mb-1">총 생산량</p>
                        <h3 id="kpi-output" class="text-2xl font-bold text-slate-800">0</h3>
                    </div>
                    <div class="p-2 bg-blue-50 rounded-lg text-secondary"><i data-lucide="package"></i></div>
                </div>
            </div>
            
            <div class="bg-surface rounded-xl p-5 border-t-4 border-danger card-shadow">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm text-slate-500 font-medium mb-1">총 불량 수</p>
                        <h3 id="kpi-defects" class="text-2xl font-bold text-slate-800">0</h3>
                    </div>
                    <div class="p-2 bg-red-50 rounded-lg text-danger"><i data-lucide="alert-triangle"></i></div>
                </div>
            </div>

            <div class="bg-surface rounded-xl p-5 border-t-4 border-success card-shadow">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm text-slate-500 font-medium mb-1">평균 수율</p>
                        <h3 id="kpi-yield" class="text-2xl font-bold text-slate-800">0%</h3>
                    </div>
                    <div class="p-2 bg-green-50 rounded-lg text-success"><i data-lucide="percent"></i></div>
                </div>
            </div>

            <div class="bg-surface rounded-xl p-5 border-t-4 border-warning card-shadow">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm text-slate-500 font-medium mb-1">평균 온도</p>
                        <h3 id="kpi-temp" class="text-2xl font-bold text-slate-800">0°C</h3>
                    </div>
                    <div class="p-2 bg-orange-50 rounded-lg text-warning"><i data-lucide="thermometer"></i></div>
                </div>
            </div>

            <div class="bg-surface rounded-xl p-5 border-t-4 border-purple-500 card-shadow col-span-2 md:col-span-1">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm text-slate-500 font-medium mb-1">평균 압력</p>
                        <h3 id="kpi-pressure" class="text-2xl font-bold text-slate-800">0</h3>
                    </div>
                    <div class="p-2 bg-purple-50 rounded-lg text-purple-500"><i data-lucide="gauge"></i></div>
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Chart 1: Process Output & Yield -->
            <div class="bg-surface rounded-xl p-6 card-shadow border border-slate-100">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <i data-lucide="bar-chart-2" class="w-5 h-5 text-secondary"></i> 공정별 생산량 및 수율
                </h2>
                <div class="relative h-64 w-full">
                    <canvas id="processChart"></canvas>
                </div>
            </div>

            <!-- Chart 2: Defect Ratio -->
            <div class="bg-surface rounded-xl p-6 card-shadow border border-slate-100">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <i data-lucide="pie-chart" class="w-5 h-5 text-secondary"></i> 생산 대비 불량 비율
                </h2>
                <div class="relative h-64 w-full flex justify-center">
                    <canvas id="defectChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Data Table Section -->
        <div class="bg-surface rounded-xl p-6 card-shadow border border-slate-100 overflow-hidden">
            <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i data-lucide="list" class="w-5 h-5 text-secondary"></i> 최근 생산 이력 (최신 15건)
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-sm border-b border-slate-200">
                            <th class="p-4 font-medium rounded-tl-lg">일시</th>
                            <th class="p-4 font-medium">라인/설비</th>
                            <th class="p-4 font-medium">공정</th>
                            <th class="p-4 font-medium">생산/불량</th>
                            <th class="p-4 font-medium">수율</th>
                            <th class="p-4 font-medium">온도/압력</th>
                            <th class="p-4 font-medium rounded-tr-lg">상태</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-slate-100">
                        <!-- Table rows will be inserted here dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Google Sheets CSV URL
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRRU13UKJ2X1ZxmlX6YZLaAqehU-X-s136lMawF9GtCUxkJKLpGToQ3Qz_U9_ueSYdPIDHmiGhKNeU0/pub?output=csv";

        // Global chart instances to destroy before redrawing
        let processChartInstance = null;
        let defectChartInstance = null;

        // Number formatting utilities
        const formatNumber = (num) => new Intl.NumberFormat('ko-KR').format(num);
        const formatPercent = (num) => parseFloat(num).toFixed(2) + '%';
        const formatDecimal = (num) => parseFloat(num).toFixed(2);

        // Parse numeric values defensively
        const parseNum = (val) => {
            if (!val) return 0;
            if (typeof val === 'number') return val;
            let parsed = parseFloat(val.toString().replace(/,/g, '').replace('%', ''));
            return isNaN(parsed) ? 0 : parsed;
        };

        // Fetch and process data
        function fetchData() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // Update time
            const now = new Date();
            document.getElementById('updateTime').innerText = now.toLocaleString('ko-KR');

            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    processData(data);
                },
                error: function(error) {
                    console.error("Error fetching data:", error);
                    alert("데이터를 불러오는 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
                    document.getElementById('loadingOverlay').style.display = 'none';
                }
            });
        }

        function processData(data) {
            if (!data || data.length === 0) {
                document.getElementById('loadingOverlay').style.display = 'none';
                return;
            }

            // Summary Statistics variables
            let totalOutput = 0;
            let totalDefects = 0;
            let totalYield = 0;
            let totalTemp = 0;
            let totalPressure = 0;
            let count = data.length;

            // Chart data structures
            const processStats = {};

            // Processing loop
            data.forEach(row => {
                const output = parseNum(row.Output);
                const defects = parseNum(row.Defects);
                let yieldVal = parseNum(row.Yield);
                // Handle percentage (if yield is like 0.95 vs 95%)
                if (yieldVal <= 1 && yieldVal > 0) yieldVal *= 100; 

                const temp = parseNum(row.Temperature);
                const pressure = parseNum(row.Pressure);

                totalOutput += output;
                totalDefects += defects;
                totalYield += yieldVal;
                totalTemp += temp;
                totalPressure += pressure;

                // Group by Process
                const process = row.Process || 'Unknown';
                if (!processStats[process]) {
                    processStats[process] = { output: 0, yieldSum: 0, count: 0 };
                }
                processStats[process].output += output;
                processStats[process].yieldSum += yieldVal;
                processStats[process].count += 1;
            });

            // Update KPIs
            document.getElementById('kpi-output').innerText = formatNumber(totalOutput);
            document.getElementById('kpi-defects').innerText = formatNumber(totalDefects);
            document.getElementById('kpi-yield').innerText = formatPercent(totalYield / count);
            document.getElementById('kpi-temp').innerText = formatDecimal(totalTemp / count) + '°C';
            document.getElementById('kpi-pressure').innerText = formatDecimal(totalPressure / count);

            // Draw Charts
            drawCharts(processStats, totalOutput, totalDefects);

            // Update Table (Recent 15)
            // Assuming data is somewhat chronological, we take the last 15. 
            // If there's a Date column, sorting might be better, but we'll reverse the array to show latest first.
            updateTable(data.slice().reverse().slice(0, 15));

            // Hide loader
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 500);
        }

        function drawCharts(processStats, totalOutput, totalDefects) {
            // Prepare Data for Process Chart
            const labels = Object.keys(processStats);
            const outputData = labels.map(l => processStats[l].output);
            const yieldData = labels.map(l => (processStats[l].yieldSum / processStats[l].count).toFixed(2));

            if (processChartInstance) processChartInstance.destroy();
            const ctx1 = document.getElementById('processChart').getContext('2d');
            processChartInstance = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '생산량',
                            data: outputData,
                            backgroundColor: 'rgba(59, 130, 246, 0.7)',
                            borderColor: 'rgba(59, 130, 246, 1)',
                            borderWidth: 1,
                            yAxisID: 'y'
                        },
                        {
                            label: '평균 수율 (%)',
                            data: yieldData,
                            type: 'line',
                            borderColor: 'rgba(16, 185, 129, 1)',
                            backgroundColor: 'rgba(16, 185, 129, 1)',
                            borderWidth: 2,
                            pointBackgroundColor: 'white',
                            pointRadius: 4,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { type: 'linear', display: true, position: 'left', title: { display: true, text: '생산량' } },
                        y1: { type: 'linear', display: true, position: 'right', min: 80, max: 100, grid: { drawOnChartArea: false }, title: { display: true, text: '수율(%)' } }
                    },
                    plugins: { legend: { position: 'top' } }
                }
            });

            // Prepare Data for Defect Chart
            if (defectChartInstance) defectChartInstance.destroy();
            const ctx2 = document.getElementById('defectChart').getContext('2d');
            const normalOutput = totalOutput - totalDefects;
            defectChartInstance = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['정상품', '불량품'],
                    datasets: [{
                        data: [normalOutput, totalDefects],
                        backgroundColor: ['rgba(16, 185, 129, 0.8)', 'rgba(239, 68, 68, 0.8)'],
                        borderColor: ['#ffffff', '#ffffff'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.label || '';
                                    if (label) label += ': ';
                                    label += formatNumber(context.raw);
                                    let percentage = ((context.raw / totalOutput) * 100).toFixed(1) + '%';
                                    return `${label} (${percentage})`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function updateTable(recentData) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            recentData.forEach(row => {
                // Formatting row data
                const dateStr = `${row['Date_월']}/${row['Date_일']} ${row['Hour']}시`;
                const lineEq = `${row['Line'] || '-'} / ${row['Equipment'] || '-'}`;
                const process = row['Process'] || '-';
                const outDef = `<span class="font-medium">${formatNumber(parseNum(row.Output))}</span> / <span class="text-danger">${formatNumber(parseNum(row.Defects))}</span>`;
                
                let yieldVal = parseNum(row.Yield);
                if (yieldVal <= 1 && yieldVal > 0) yieldVal *= 100;
                
                const tempPress = `${formatDecimal(parseNum(row.Temperature))}°C / ${formatDecimal(parseNum(row.Pressure))}b`;

                // Status logic
                let statusBadge = '';
                if (yieldVal >= 95) {
                    statusBadge = '<span class="px-2.5 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold border border-green-200">정상</span>';
                } else if (yieldVal >= 90) {
                    statusBadge = '<span class="px-2.5 py-1 bg-orange-100 text-orange-700 rounded-full text-xs font-bold border border-orange-200">주의</span>';
                } else {
                    statusBadge = '<span class="px-2.5 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold border border-red-200">점검요망</span>';
                }

                // Yield Bar visualization
                const yieldBar = `
                    <div class="flex items-center gap-2">
                        <span class="w-12 text-right">${yieldVal.toFixed(1)}%</span>
                        <div class="w-20 bg-slate-200 rounded-full h-2">
                            <div class="bg-${yieldVal >= 95 ? 'success' : (yieldVal >= 90 ? 'warning' : 'danger')} h-2 rounded-full" style="width: ${yieldVal}%"></div>
                        </div>
                    </div>
                `;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 text-slate-500">${dateStr}</td>
                    <td class="p-4 font-medium text-slate-700">${lineEq}</td>
                    <td class="p-4 text-slate-600">${process}</td>
                    <td class="p-4">${outDef}</td>
                    <td class="p-4">${yieldBar}</td>
                    <td class="p-4 text-slate-500">${tempPress}</td>
                    <td class="p-4">${statusBadge}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            fetchData();
        });
    </script>
</body>
</html>
